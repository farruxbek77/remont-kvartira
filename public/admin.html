<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ панели - Аризалар бошқаруви</title>
    <link rel="stylesheet" href="admin-styles.css">
</head>

<body>
    <div class="admin-container">
        <header class="admin-header">
            <div class="header-content">
                <div class="admin-title">
                    <h1>🔧 REMONT PRO - Админ панели</h1>
                </div>
                <div class="header-stats">
                    <div class="stat-badge">
                        <span class="stat-label">Жами:</span>
                        <span id="totalCount" class="stat-value">0</span>
                    </div>
                    <div class="stat-badge pending">
                        <span class="stat-label">Кутилмоқда:</span>
                        <span id="pendingCount" class="stat-value">0</span>
                    </div>
                </div>
            </div>
            <div class="header-actions">
                <a href="/" class="back-link">← Бош саҳифага</a>
                <button onclick="logout()" class="logout-btn">Чиқиш</button>
            </div>
        </header>

        <div class="admin-content">
            <!-- Statistics Dashboard -->
            <div class="dashboard">
                <div class="stat-card">
                    <div class="stat-icon">📊</div>
                    <div class="stat-info">
                        <h3 id="totalRequests">0</h3>
                        <p>Жами аризалар</p>
                    </div>
                </div>
                <div class="stat-card pending">
                    <div class="stat-icon">⏳</div>
                    <div class="stat-info">
                        <h3 id="pendingRequests">0</h3>
                        <p>Кутилмоқда</p>
                    </div>
                </div>
                <div class="stat-card approved">
                    <div class="stat-icon">✅</div>
                    <div class="stat-info">
                        <h3 id="approvedRequests">0</h3>
                        <p>Қабул қилинган</p>
                    </div>
                </div>
                <div class="stat-card rejected">
                    <div class="stat-icon">❌</div>
                    <div class="stat-info">
                        <h3 id="rejectedRequests">0</h3>
                        <p>Рад этилган</p>
                    </div>
                </div>
            </div>

            <div class="filters">
                <button class="filter-btn active" data-filter="all">Барчаси</button>
                <button class="filter-btn" data-filter="pending">Кутилмоқда</button>
                <button class="filter-btn" data-filter="approved">Қабул қилинган</button>
                <button class="filter-btn" data-filter="rejected">Рад этилган</button>
            </div>

            <div id="requestsList" class="requests-list">
                <div class="loading">⏳ Юкланмоқда...</div>
            </div>
        </div>
    </div>

    <!-- Modal for request details -->
    <div id="requestModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="admin-script.js"></script>
    <script>
        // Check if logged in
        if (!sessionStorage.getItem('adminLoggedIn')) {
            window.location.href = '/admin-login';
        }

        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            window.location.href = '/admin-login';
        }
    </script>
</body>

</html>
